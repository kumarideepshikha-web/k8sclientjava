    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: ImportOperation represents an import operation for a virtual
          machine in the API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImportOperationSpec defines the desired state of import operation.
            properties:
              controlAction:
                description: |-
                  Once ControlAction is unset, it can not be updated.
                  Once ControlAction is set, it can not be unset.
                  The default control action will be unset, to keep backward compatibility, v1alpha1 API does not support control action.
                properties:
                  commitAction:
                    description: The default commit action will be CommitActionWait.
                    type: string
                  precheckOnly:
                    default: false
                    description: |-
                      PrecheckOnly indicates whether the import operation should perform only the precheck phase.

                      When PrecheckOnly is set to true, the import operation will run prechecks to detect as many potential blockers
                      as possible without altering any infrastructure state, then pause without proceeding further in the workflow.
                      When set to false, the import operation continues with the rest of the workflow after prechecks.

                      PrecheckOnly may be updated from true to false to resume the workflow, but cannot be updated from false to true,
                      as it would be semantically unclear to perform only a precheck after other workflow steps have already executed.
                    type: boolean
                  rollbackAction:
                    description: |-
                      If RollbackAction is unset, no rollback action will be taken.
                      The default rollback action will be unset.
                    type: string
                type: object
              diskStorageClasses:
                description: |-
                  DiskStorageClasses specifies per-disk storage class overrides for individual VM disks.
                  Each entry maps a specific disk (identified by deviceKey) to a custom storage class.
                  Disks not specified here will use the default StorageClass.

                  This enables per-disk storage class assignment during import, allowing different storage
                  policies for different disk types.
                items:
                  description: DiskStorageClass specifies storage class for a specific
                    VM disk.
                  properties:
                    deviceKey:
                      description: DeviceKey is the vSphere virtual device key identifying
                        the specific disk.
                      format: int32
                      minimum: 0
                      type: integer
                    storageClass:
                      description: StorageClass name for this specific disk
                      type: string
                  required:
                  - deviceKey
                  - storageClass
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - deviceKey
                x-kubernetes-list-type: map
              mode:
                default: assigned
                description: |-
                  Mode is the default network configuration mode for all the VM NICs, unless overridden in the individual
                  NetworkInterfaceSpec.
                enum:
                - assigned
                - preserve
                type: string
              networkCustomization:
                description: NetworkCustomization is used to configure the network
                  identity of the importing virtual machine by assigning one from
                  the Supervisor Workload Network via Guest OS customization.
                properties:
                  customizationSysprepUserData:
                    description: CustomizationSysprepUserData contains the user data
                      for sysprep customization.
                    properties:
                      computerName:
                        description: |-
                          ComputerName is the computer name of the Windows virtual machine. It must be 1 to 15 characters in length.

                          Validation Rules:
                          - If the name is 1 or 2 characters long, it can consist of letters (A-Z, a-z), numbers (0-9), or symbols.
                          - If the name is between 3 and 15 characters:
                            - It must start and end with a letter, number, or symbol (excluding hyphens).
                            - Middle characters (if any) can be letters, numbers, symbols, or hyphens (-).
                            - Hyphens are **not** allowed at the beginning or end of the name.

                          - The name must not contain spaces or periods (.).

                          Examples of valid ComputerName values:
                          - "A"
                          - "AB"
                          - "Server1"
                          - "Workstation-01"
                          - "WEB_SERVER"
                          - "Comp-Name"

                          Examples of invalid ComputerName values:
